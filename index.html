<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanjar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f0ebe0;
      --border: #b8a98e;
      --text:   #1c1409;
      --muted:  #7a6a50;
      --green:  #1e5c28;
      --mono:   'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 2rem;
      border: 1px solid var(--border);
    }

    .name {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 3px;
      color: var(--green);
      margin-bottom: 0.4rem;
    }

    .role {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: color 0.15s;
    }

    .links a:hover { color: var(--green); }

    .links a::before {
      content: '→';
      color: var(--muted);
      font-size: 0.75rem;
    }

    .links a:hover::before { color: var(--green); }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="name">sanjar</div>
    <div class="role">precision mediump human</div>
    <hr class="divider" />
    <ul class="links">
      <li><a href="./portfolio.html">Your GPU Works for Me Now</a></li>
    </ul>
    <div class="footer">more coming soon</div>
  </div>
</body>
</html>
