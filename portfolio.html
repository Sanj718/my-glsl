<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLSL Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0ebe0;
      --paper:   #ece6d9;
      --border:  #b8a98e;
      --border2: #d4c8b4;
      --text:    #1c1409;
      --muted:   #7a6a50;
      --green:   #1e5c28;
      --mono:    'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      background-image:
        linear-gradient(var(--border2) 1px, transparent 1px),
        linear-gradient(90deg, var(--border2) 1px, transparent 1px);
      background-size: 28px 28px;
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      padding: 0.7rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .topbar-title {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
    }
    .topbar-title::before { content: '> '; color: var(--muted); }
    .topbar-tag {
      font-size: 0.62rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 7px;
    }

    /* ── Grid ── */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      align-content: start;
      border-left: 1px solid var(--border2);
    }

    /* ── Card ── */
    .card {
      background: var(--paper);
      border-right: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
    }

    .card-canvas-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: #0a0a06;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .card-canvas-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 3px
      );
      pointer-events: none;
      z-index: 1;
    }
    .card canvas { width: 100% !important; height: 100% !important; display: block; }

    .card-index {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      background: rgba(10,10,6,.7);
      color: #5a7a4a;
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 2px 6px;
      z-index: 2;
    }

    .card-body { padding: 0.85rem 1rem; }
    .card-name {
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Fullscreen modal ── */
    .fs-backdrop {
      position: fixed;
      inset: 0;
      background: #0a0a06;
      z-index: 100;
      display: none;
      flex-direction: column;
    }
    .fs-backdrop.open { display: flex; }

    #fs-canvas { display: block; flex: 1; width: 100%; }

    .fs-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0.9rem;
      background: rgba(10,10,6,.8);
      border-bottom: 1px solid #2a3a1a;
      z-index: 10;
      font-size: 0.65rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .fs-name { color: #8fbc6a; }
    .fs-close {
      color: #5a7a4a;
      cursor: pointer;
      border: 1px solid #3a4a2a;
      padding: 2px 8px;
      font-family: var(--mono);
      font-size: 0.65rem;
      background: none;
      transition: color .1s;
    }
    .fs-close:hover { color: #8fbc6a; }

    .fs-scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 3px
      );
      pointer-events: none;
      z-index: 9;
    }

    /* ── Footer ── */
    footer {
      border-top: 2px solid var(--border);
      background: var(--paper);
      padding: 0.8rem 1.4rem;
      font-size: 0.62rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    footer::before { content: '/* eof */  '; color: var(--border); }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Your GPU Works for Me Now</span>
  <span class="topbar-tag">I Bend Light</span>
</div>

<div class="grid" id="grid"></div>

<!-- Fullscreen modal -->
<div class="fs-backdrop" id="fs-backdrop">
  <div class="fs-bar">
    <span class="fs-name" id="fs-name"></span>
    <button class="fs-close" id="fs-close">[esc]</button>
  </div>
  <div class="fs-scanlines"></div>
  <canvas id="fs-canvas"></canvas>
</div>

<footer>uTime &amp; uResolution auto-injected</footer>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { SHADERS } from './loader.js';

function createRenderer(canvas) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'low-power' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  const scene    = new THREE.Scene();
  const camera   = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  return { renderer, scene, camera };
}

function buildMaterial(vert, frag) {
  return new THREE.ShaderMaterial({
    vertexShader: vert, fragmentShader: frag,
    uniforms: { uTime: { value: 0 }, uResolution: { value: new THREE.Vector2(1,1) } },
  });
}

const visibleCards = new Set();
new IntersectionObserver(entries => {
  entries.forEach(e => e.isIntersecting ? visibleCards.add(e.target) : visibleCards.delete(e.target));
}, { threshold: 0.1 }).observe(document.getElementById('grid'));

const grid      = document.getElementById('grid');
const renderers = [];

SHADERS.forEach((shader, idx) => {
  const card = document.createElement('div');
  card.className = 'card';

  const wrap = document.createElement('div');
  wrap.className = 'card-canvas-wrap';

  const badge = document.createElement('div');
  badge.className   = 'card-index';
  badge.textContent = String(idx + 1).padStart(2, '0');

  const canvas = document.createElement('canvas');
  wrap.appendChild(badge);
  wrap.appendChild(canvas);
  card.appendChild(wrap);

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = `<div class="card-name">${shader.name}</div>`;
  card.appendChild(body);

  grid.appendChild(card);

  const { renderer, scene, camera } = createRenderer(canvas);
  const mat = buildMaterial(shader.vert, shader.frag);
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));

  function resize() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w, h, false);
    mat.uniforms.uResolution.value.set(w * renderer.getPixelRatio(), h * renderer.getPixelRatio());
  }

  renderers.push({ renderer, scene, camera, mat, resize, card });

  // observe the card itself for visibility
  new IntersectionObserver(([e]) => {
    e.isIntersecting ? visibleCards.add(card) : visibleCards.delete(card);
  }, { threshold: 0.1 }).observe(card);

  // click canvas to open fullscreen
  wrap.addEventListener('click', () => openFs(shader));
});

window.addEventListener('resize', () => renderers.forEach(r => r.resize()));
requestAnimationFrame(() => renderers.forEach(r => r.resize()));

const t0 = performance.now();
(function animate() {
  requestAnimationFrame(animate);
  const t = (performance.now() - t0) / 1000;
  renderers.forEach(({ renderer, scene, camera, mat, card }) => {
    if (!visibleCards.has(card)) return;
    mat.uniforms.uTime.value = t;
    renderer.render(scene, camera);
  });
})();

// ── Fullscreen ───────────────────────────────────────────
const fsBackdrop = document.getElementById('fs-backdrop');
const fsCanvas   = document.getElementById('fs-canvas');
const fsName     = document.getElementById('fs-name');
const fsClose    = document.getElementById('fs-close');

let fsRenderer = null, fsMat = null, fsActive = false;

function openFs(shader) {
  fsName.textContent = shader.name;
  if (fsRenderer) { fsRenderer.dispose(); fsRenderer = null; }

  const { renderer, scene, camera } = createRenderer(fsCanvas);
  fsRenderer = renderer;
  fsMat = buildMaterial(shader.vert, shader.frag);
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fsMat));
  fsRenderer._scene  = scene;
  fsRenderer._camera = camera;

  function resize() {
    fsRenderer.setSize(window.innerWidth, window.innerHeight, false);
    fsMat.uniforms.uResolution.value.set(
      window.innerWidth  * devicePixelRatio,
      window.innerHeight * devicePixelRatio
    );
  }
  resize();
  window._resizeFs = resize;

  fsActive = true;
  fsBackdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFs() {
  fsActive = false;
  fsBackdrop.classList.remove('open');
  document.body.style.overflow = '';
}

fsClose.addEventListener('click', closeFs);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFs(); });
window.addEventListener('resize', () => window._resizeFs?.());

// fs animate loop
const fsClock = { start: performance.now() };
(function fsLoop() {
  requestAnimationFrame(fsLoop);
  if (!fsActive || !fsRenderer) return;
  fsMat.uniforms.uTime.value = (performance.now() - fsClock.start) / 1000;
  fsRenderer.render(fsRenderer._scene, fsRenderer._camera);
})();
</script>
</body>
</html>
